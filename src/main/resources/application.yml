server:
  port: 8080
  ssl:
    enabled: false

security:
  require-https: true

spring:
  application:
    name: swagger-jwt-api

app:
  jwt:
    issuer: swagger-jwt-api
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000