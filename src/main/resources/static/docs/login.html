<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Swagger</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 420px;
            margin: 60px auto;
            padding: 24px;
        }
        h1 {
            margin-bottom: 16px;
        }
        form {
            display: grid;
            gap: 12px;
        }
        input, button {
            padding: 10px;
            font-size: 14px;
        }
        .error {
            color: #b00020;
            margin-top: 12px;
        }
        .hint {
            color: #555;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<h1>Swagger Login</h1>
<p class="hint">Usuarios disponibles: admin / 12345 o user / 12345</p>

<form id="loginForm">
    <input type="text" id="username" placeholder="Usuario" value="admin" required>
    <input type="password" id="password" placeholder="Password" value="12345" required>
    <button type="submit">Entrar a Swagger</button>
</form>

<p id="error" class="error"></p>

<script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('error');

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        errorBox.textContent = '';

        const payload = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error('Credenciales invalidas');
            }

            const data = await response.json();
            localStorage.setItem('swagger_jwt', data.token);
            window.location.href = '/docs/index.html';
        } catch (error) {
            errorBox.textContent = error.message;
        }
    });
</script>
</body>
</html>
